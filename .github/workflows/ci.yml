name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1
          lfs: false
          submodules: false
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: 3.13.12

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: 0.11.23
          enable-cache: true
          cache-dependency-glob: tools/uv.lock

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.14.0

      - name: Install dependencies
        run: |
          npm install --global pnpm@11.11.0
          cd tools
          uv sync --frozen --all-groups
          cd ../cloudflare
          pnpm install --frozen-lockfile

      - name: Test Python tooling
        working-directory: tools
        run: |
          uv run pytest
          uv run pyright

      - name: Test Worker
        working-directory: cloudflare
        run: pnpm check

  repository-e2e:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1
          lfs: false
          submodules: false
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: 3.13.12

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: 0.11.23
          enable-cache: true
          cache-dependency-glob: tools/uv.lock

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.14.0

      - name: Install dependencies and system tools
        run: |
          npm install --global pnpm@11.11.0
          cd tools
          uv sync --frozen --all-groups
          cd ../cloudflare
          pnpm install --frozen-lockfile
          cd ..
          .github/scripts/install-aptly.sh
          .github/scripts/verify-toolchain.sh

      - name: Compute repository plan
        id: plan
        working-directory: tools
        run: echo "digest=$(uv run plan-digest | sed 's/^sha256://')" >> "$GITHUB_OUTPUT"

      - name: Restore package cache
        id: package-cache
        uses: actions/cache/restore@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: packages
          key: edgeapt-packages-${{ runner.os }}-${{ steps.plan.outputs.digest }}
          restore-keys: |
            edgeapt-packages-${{ runner.os }}-

      - name: Validate and build repository
        working-directory: tools
        run: |
          uv run init-test-key
          uv run refresh-ubuntu-index
          uv run validate
          uv run repackage --mode locked
          uv run generate --profile test

      - name: Run package installation matrix
        working-directory: tools
        run: uv run e2e --no-apt-cache

      - name: Save package cache
        if: github.event_name != 'pull_request' && steps.package-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: packages
          key: edgeapt-packages-${{ runner.os }}-${{ steps.plan.outputs.digest }}
