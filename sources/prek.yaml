template: edgeapt.single_binary/v1
id: prek
package: prek
e2e_commands:
  - [prek, --version]

repackage:
  install_path: /usr/bin/prek
  metadata:
    description: "A fast Git hook manager written in Rust, designed as a drop-in alternative to pre-commit, reimagined."
    homepage: "https://github.com/j178/prek"

upstream:
  - version: v0.4.9
    revision: 1
    arch: amd64
    suites: [focal, jammy, noble, resolute]
    url: "https://github.com/j178/prek/releases/download/v0.4.9/prek-x86_64-unknown-linux-gnu.tar.gz"
    extract_path: prek-x86_64-unknown-linux-gnu/prek
