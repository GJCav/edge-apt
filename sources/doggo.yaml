template: edgeapt.single_binary/v1
id: doggo
package: doggo
e2e_commands:
  - [doggo, --version]

repackage:
  install_path: /usr/bin/doggo
  metadata:
    description: "Command-line DNS client for humans"
    homepage: "https://github.com/mr-karan/doggo"

upstream:
  - version: v1.1.7
    revision: 1
    arch: amd64
    suites: [focal, jammy, noble, resolute]
    url: "https://github.com/mr-karan/doggo/releases/download/v1.1.7/doggo_1.1.7_Linux_x86_64.tar.gz"
    extract_path: doggo_1.1.7_Linux_x86_64/doggo
  
  - version: v1.2.0
    revision: 1
    arch: amd64
    suites: [focal, jammy, noble, resolute]
    url: "https://github.com/mr-karan/doggo/releases/download/v1.2.0/doggo-linux-x86_64.tar.gz"
    extract_path: doggo
