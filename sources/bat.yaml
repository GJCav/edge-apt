template: edgeapt.deb_upstream/v1
id: bat
package: bat
e2e_commands:
  - [bat, --version]
allow_ubuntu_package_override: true
override_reason: "Use upstream bat release directly instead of Ubuntu packaged version."

upstream:
  - version: 0.25.0
    arch: amd64
    suites: [focal, jammy, noble, resolute]
    url: "https://github.com/sharkdp/bat/releases/download/v0.25.0/bat_0.25.0_amd64.deb"
