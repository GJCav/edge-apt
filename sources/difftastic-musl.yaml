template: edgeapt.single_binary/v1
id: difftastic-musl
package: difftastic-musl
e2e_commands:
  - [difft, --version]

repackage:
  install_path: /usr/bin/difft
  metadata:
    description: "Difftastic is a structural diff tool that understands syntax (musl build)."
    homepage: "https://github.com/Wilfred/difftastic"

upstream:
  - version: v0.69.0
    revision: 1
    arch: amd64
    suites: [focal, jammy, noble, resolute]
    url: "https://github.com/Wilfred/difftastic/releases/download/0.69.0/difft-x86_64-unknown-linux-musl.tar.gz"
    sha256: "sha256:c120a4315b33e89678d52b47ea0097cdb1fb57b4f3910b4d77cbeee5eecc8ced"
    extract_path: difft
